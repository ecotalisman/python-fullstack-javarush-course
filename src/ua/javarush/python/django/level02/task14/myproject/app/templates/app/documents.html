<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список документів</title>
</head>
<body>
    <h1>Завантажені документи</h1>
    <ul>
        {% for document in documents %}
            <li>
                <a href="{{ document.file.url }}">{{ document.file.name }}</a>  <!-- Посилання на файл -->
            </li>
        {% endfor %}
    </ul>
</body>
</html>
