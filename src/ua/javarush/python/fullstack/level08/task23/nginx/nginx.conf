# Configuring an Nginx Reverse Proxy
#
# Create a configuration for Nginx that will work as a reverse proxy
# for the frontend ReactJS service and the backend Flask service.
# All requests sent to /api must be forwarded to the backend,
# and all other requests must be forwarded to the frontend.
#
# Requirements:
#
# 1. The reverse proxy must route all requests sent to /api
#    to the backend Flask service, ensuring correct routing.
# 2. The reverse proxy must forward all other requests that are not related to /api
#    to the frontend ReactJS service, allowing static files and application pages
#    to be handled correctly.
# 3. Nginx must be used to configure the reverse proxy,
#    following the syntax and standards of Nginx configuration files.
#
# 🇺🇦 Ukrainian version:
#
# Налаштування реверс-проксі Nginx
#
# Створіть конфігурацію для Nginx, яка буде працювати як реверс-проксі
# для фронтенда ReactJS і бекенда Flask.
# Усі запити, направлені на /api, мають перенаправлятися на бекенд,
# а решта запитів — на фронтенд.
#
# Вимоги:
#
# 1. Реверс-проксі повинен розподіляти всі запити, направлені на /api,
#    на сервіс бекенда Flask, забезпечуючи правильну маршрутизацію.
# 2. Реверс-проксі повинен перенаправляти всі інші запити,
#    які не стосуються /api, на сервіс фронтенда ReactJS,
#    дозволяючи коректно обробляти статичні файли та сторінки застосунку.
# 3. Необхідно використовувати Nginx для налаштування реверс-проксі,
#    дотримуючись синтаксису та стандартів конфігураційних файлів Nginx.

events {}

http {
    server {
        listen 80;

        # Route all /api requests to the backend
        location /api {
            proxy_pass http://backend:5000;  # Assume that the Flask app is running on port 5000
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route all other requests to the frontend
        location / {
            proxy_pass http://frontend:3000;  # Assume that the ReactJS app is hosted on port 3000
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}