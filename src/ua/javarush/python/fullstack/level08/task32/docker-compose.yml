version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    # Command to simulate a successful startup
    command: [ "sh", "-c", "echo 'nginx started'; nginx -g 'daemon off;'" ]

  app:
    image: busybox
    command: tail -f /dev/null

  db:
    image: busybox
    command: tail -f /dev/null