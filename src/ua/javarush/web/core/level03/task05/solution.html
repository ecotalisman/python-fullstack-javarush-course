<!--
Grouping with <div>

Create a container using the <div> tag, inside which there will be a level 2 heading and a paragraph of text.
The heading must contain the text "Section Heading", and the paragraph must contain "Some text inside the div block."

Requirements:
• The document must include a <div> tag that serves as a container for grouping elements.
• The document must include an <h2> tag inside the <div> tag containing the text "Heading".
• The document must include a <p> tag inside the <div> tag containing the text "Some text.".
• The elements enclosed in the <h2> and <p> tags must be located inside the <div> tag.
• The <h2> tag must come before the <p> tag inside the <div> tag.

🇺🇦 Ukrainian version:

Групування з
Створіть контейнер за допомогою тега <div>, всередині якого буде заголовок рівня 2 та абзац тексту. Заголовок повинен
містити текст "Заголовок секції", а абзац — "Деякий текст всередині блока div.".

Вимоги:
• Документ повинен включати тег <div>, який слугує контейнером для групування елементів.
• Документ повинен включати тег <h2> всередині тега <div>, який містить текст "Заголовок".
• Документ повинен включати тег <p> всередині тега <div>, який містить текст "Деякий текст.".
• Елементи, укладені в теги <h2> та <p>, повинні знаходитись всередині тега <div>.
• Тег <h2> повинен передувати тегу <p> всередині тега <div>.
-->

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Документ</title>
</head>
<body>
    <div>
        <h2>Заголовок</h2>
        <p>Деякий текст.</p>
    </div>
</body>
</html>
