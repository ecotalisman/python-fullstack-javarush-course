<!--
Global Errors

Set up global error handlers for window.onerror and window.onunhandledrejection. Create an asynchronous function that throws
an error after 1 second, and a Promise that is immediately rejected with an error. Both errors must be handled by
the global handlers, outputting error messages to the console.

Requirements:
• The program must set a global error handler for the window.onerror event that outputs error messages to the console.
• The program must set a global error handler for the window.onunhandledrejection event that outputs error messages to
the console.
• The program must include an asynchronous function that throws an error after 1 second.
• The program must include a Promise that is immediately rejected with an error.
• Both errors generated by the asynchronous function and the rejected Promise must be handled by the global handlers,
outputting error messages to the console.

🇺🇦 Ukrainian version:

Глобальні помилки
Налаштуйте глобальні обробники помилок для window.onerror і window.onunhandledrejection. Створіть асинхронну функцію,
яка через 1 секунду генерує помилку, і проміс, який одразу ж відхиляється з помилкою. Обидві помилки повинні оброблятися
глобальними обробниками, виводячи повідомлення про помилки в консоль.

Вимоги:
• Програма повинна встановити глобальний обробник помилок для події window.onerror, який буде виводити повідомлення
про помилки в консоль.
• Програма повинна встановити глобальний обробник помилок для події window.onunhandledrejection, який буде виводити
повідомлення про помилки в консоль.
• Програма повинна включати асинхронну функцію, яка через 1 секунду генерує помилку.
• Програма повинна включати проміс, який одразу ж відхиляється з помилкою.
• Обидві помилки, згенеровані асинхронною функцією і відхиленим промісом, повинні бути оброблені глобальними обробниками,
виводячи повідомлення про помилки в консоль.
-->

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Global Error Handling</title>
</head>
<body>
    <script>
        // Setting a global error handler for window.onerror
        window.onerror = function (message, source, lineno, colno, error) {
            console.error("Global error handler: ", error);
        };

        // Setting a global error handler for window.onunhandledrejection
        window.onunhandledrejection = function (event) {
            console.error('Unhandled promise rejection: ', event.reason);
        };

        // Asynchronous function that throws an error after 1 second
        async function fetchData() {
            await new Promise((resolve => setTimeout(resolve, 1000)));
            throw new Error("Synchronous Error");
        }

        // Creating a rejected Promise
        new Promise((resolve, reject) => {
            reject(new Error("Promise error"));
        });

        // Calling the asynchronous function to generate an error
        fetchData();

    </script>
</body>
</html>
